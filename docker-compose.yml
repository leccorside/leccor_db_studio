version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: leccor_db_pg
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: leccordb_test
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mysql:
    image: mysql:8
    container_name: leccor_db_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: leccordb_test
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  pgdata:
  mysqldata:
